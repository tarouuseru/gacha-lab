<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Series Admin</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .grid { display: grid; gap: 12px; }
      .row { display: grid; gap: 8px; }
      input { padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,.2); background: #0d1218; color: var(--text); }
      select { padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,.2); background: #0d1218; color: var(--text); }
      .mono { font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
      .report-list { display: grid; gap: 10px; }
      .report-item { border: 1px solid rgba(255,255,255,.2); border-radius: 10px; padding: 10px; background: rgba(255,255,255,.03); }
      .report-item .meta { color: var(--muted); font-size: 12px; }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">GACHA LAB ADMIN (SERIES)</div>
    </header>
    <main>
      <section class="card grid">
        <div class="row">
          <label>API_BASE</label>
          <input id="apiBase" type="text" />
        </div>
        <div class="row">
          <label>ADMIN_TOKEN</label>
          <input id="adminToken" type="password" />
        </div>
        <div class="row">
          <label>Series ID</label>
          <input id="seriesId" type="text" />
        </div>
        <div class="modal-actions">
          <button class="btn" id="suspendBtn" type="button">Suspend Series</button>
        </div>
        <div id="status" class="small"></div>
        <div id="output" class="mono"></div>
      </section>
      <section class="card grid">
        <div class="row">
          <label>Reports Filter</label>
          <select id="reportStatus">
            <option value="">all</option>
            <option value="open" selected>open</option>
            <option value="closed">closed</option>
          </select>
        </div>
        <div class="modal-actions">
          <button class="btn" id="loadReportsBtn" type="button">Load Reports</button>
        </div>
        <div id="reportStatusText" class="small"></div>
        <div id="reportList" class="report-list"></div>
      </section>
    </main>
    <script src="./admin-series.js"></script>
  </body>
</html>
