<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Series Admin</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .grid { display: grid; gap: 12px; }
      .row { display: grid; gap: 8px; }
      input { padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,.2); background: #0d1218; color: var(--text); }
      select { padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,.2); background: #0d1218; color: var(--text); }
      .mono { font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
      .report-list { display: grid; gap: 10px; }
      .report-item { border: 1px solid rgba(255,255,255,.2); border-radius: 10px; padding: 10px; background: rgba(255,255,255,.03); }
      .report-item .meta { color: var(--muted); font-size: 12px; }
      .summary-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
      .summary-item { border: 1px solid rgba(255,255,255,.2); border-radius: 10px; padding: 10px; background: rgba(255,255,255,.03); }
      .summary-item .label { color: var(--muted); font-size: 12px; }
      .summary-item .value { font-size: 20px; font-weight: 700; }
      .summary-item .value-small { font-size: 14px; font-weight: 600; word-break: break-word; }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">GACHA LAB ADMIN (SERIES)</div>
    </header>
    <main>
      <section class="card grid">
        <div class="row">
          <label>API_BASE</label>
          <input id="apiBase" type="text" />
        </div>
        <div class="row">
          <label>ADMIN_TOKEN</label>
          <input id="adminToken" type="password" />
        </div>
        <div class="row">
          <label>Series ID</label>
          <input id="seriesId" type="text" />
        </div>
        <div class="row">
          <label>Series Select</label>
          <select id="seriesSelect">
            <option value="">(select series)</option>
          </select>
        </div>
        <div class="row">
          <label>Series Search (title/slug)</label>
          <input id="seriesSearch" type="text" placeholder="keyword..." />
        </div>
        <div class="row">
          <label>Series Status Filter</label>
          <select id="seriesStatusFilter">
            <option value="">all</option>
            <option value="draft">draft</option>
            <option value="published">published</option>
            <option value="suspended">suspended</option>
          </select>
        </div>
        <div class="modal-actions">
          <button class="btn secondary" id="loadSeriesBtn" type="button">Load Series</button>
          <button class="btn" id="suspendBtn" type="button">Suspend Series</button>
          <button class="btn secondary" id="unsuspendBtn" type="button">Unsuspend Series</button>
        </div>
        <div id="status" class="small"></div>
        <div id="output" class="mono"></div>
      </section>
      <section class="card grid">
        <div class="row">
          <label>Admin Dashboard</label>
          <div class="summary-grid">
            <div class="summary-item">
              <div class="label">total reports</div>
              <div class="value" id="summaryTotalReports">-</div>
            </div>
            <div class="summary-item">
              <div class="label">open reports</div>
              <div class="value" id="summaryOpenReports">-</div>
            </div>
            <div class="summary-item">
              <div class="label">suspended series</div>
              <div class="value" id="summarySuspendedSeries">-</div>
            </div>
            <div class="summary-item">
              <div class="label">open rate</div>
              <div class="value" id="summaryOpenRate">-</div>
            </div>
            <div class="summary-item">
              <div class="label">latest report</div>
              <div class="value-small" id="summaryLatestReport">-</div>
            </div>
          </div>
          <div id="summaryStatus" class="small"></div>
        </div>
        <div class="row">
          <label>Reports Filter</label>
          <select id="reportStatus">
            <option value="">all</option>
            <option value="open" selected>open</option>
            <option value="closed">closed</option>
          </select>
        </div>
        <div class="row">
          <label>Report Search (detail/id/series)</label>
          <input id="reportSearch" type="text" placeholder="keyword..." />
        </div>
        <div class="row">
          <label>Report Reason Filter</label>
          <select id="reportReasonFilter">
            <option value="">all</option>
          </select>
        </div>
        <div class="row">
          <label>Report Series Status Filter</label>
          <select id="reportSeriesStatusFilter">
            <option value="">all</option>
            <option value="draft">draft</option>
            <option value="published">published</option>
            <option value="suspended">suspended</option>
          </select>
        </div>
        <div class="row">
          <label>Resolve Note</label>
          <input id="resolveNote" type="text" placeholder="resolved by admin..." />
        </div>
        <div class="modal-actions">
          <button class="btn" id="loadReportsBtn" type="button">Load Reports</button>
        </div>
        <div id="reportStatusText" class="small"></div>
        <div id="reportList" class="report-list"></div>
      </section>
    </main>
    <script src="./admin-series.js"></script>
  </body>
</html>
